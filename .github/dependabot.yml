version: 2
registries:
  github-nuget:
    type: nuget-feed
    url: https://nuget.pkg.github.com/iikuzmychov/index.json
    username: iikuzmychov
    password: ${{secrets.GH_PACKAGES_TOKEN}}
updates:
  - package-ecosystem: "nuget"
    directory: "/gallery/frame-0525"
    registries:
      - github-nuget
    schedule:
      interval: "daily"
    open-pull-requests-limit: 1
    groups:
      frame:
        patterns: ["*"]
    ignore:
      - dependency-name: "*"
        versions: ["> 1.525.0"]
